description: >-
  Guilherme earned his PhD in Computer Science in December 2025, focusing on the computational study and algorithmic improvement of symbolic regression methods and benchmarks. He also holds B.S. degrees in Computer Science and Neuroscience, all from the Federal University of ABC in Brazil.

  He is currently a postdoctoral researcher at CavaLab, where he joined in February 2026.
  His current work includes developing methods and applications of symbolic regression and large language models for healthcare, with an emphasis on interpretable decision-making and predictive modeling. He also works on machine learning models using fMRI data and neural network applications for temporal data.

  His research interests include model interpretability, data visualization, explainable AI, and healthcare prediction and modeling.
